<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Point Cloud Viewer</title>
    <style> body { margin: 0; overflow: hidden; font-family: sans-serif; } #status { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 8px; } </style>
</head>
<body>
    <div id="status">Connecting...</div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x050510);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.5, 2);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.GridHelper(5, 20));
        let pointCloud = null;

        function updatePoints(pointsArray) {
            if (!pointsArray || pointsArray.length === 0) return;
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            pointsArray.forEach(p => { positions.push(p.x, p.y, p.z); });
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.03 });
            const newPoints = new THREE.Points(geometry, material);
            if (pointCloud) scene.remove(pointCloud);
            pointCloud = newPoints;
            scene.add(pointCloud);
        }

        const ws = new WebSocket('wss://lidar-relay-server--glm0d.replit.app');
        ws.onopen = () => document.getElementById('status').innerText = 'Connected, waiting for data...';
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'pointcloud') {
                updatePoints(data.points);
                document.getElementById('status').innerText = `Received ${data.points.length} points`;
            } else if (data.type === 'command' && data.command === 'changeColor') {
                // يمكن إضافة تغيير اللون هنا لاحقاً
            }
        };
        ws.onclose = () => document.getElementById('status').innerText = 'Disconnected';

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
